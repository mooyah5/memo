<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p id="present"></p>
    <select name="" id="time">
      <option value="3000" selected>3s</option>
      <option value="10000">10s</option>
      <option value="20000">20s</option>
      <option value="600000">1m</option>
      <option value="3000000">5m</option>
      <option value="36000000">1h</option>
    </select>
    <button id="fetch">가져오깅</button>

    <script>
      const cacheMap = new Map();
      async function fetchCacheBasic(url, options) {
        try {
          const res = await fetch(url, {
            method: "GET",
            ...options,
            cache: "no-store",
          });
          const data = await res.json();
          cacheMap.set(url, data);

          return data;
        } catch (error) {
          if (cacheMap.has(url)) {
            return cacheMap.get(url);
          } else {
            throw error;
          }
        }
      }

      function checkCache(url) {
        return cacheMap.has(url);
      }

      const url = "https://jsonplaceholder.typicode.com/todos/1";
      const present = document.getElementById("present");
      const fetchBtn = document.getElementById("fetch");

      fetchBtn.addEventListener("click", async () => {
        if (checkCache(url)) {
          console.log("캐시에서 데이터 가져옴");
          present.textContent = JSON.stringify(cacheMap.get(url));
        } else {
          console.log("네트워크에서 데이터 가져옴");
          present.textContent = JSON.stringify(await fetchCacheBasic(url));
        }
        let intervalId = setInterval(() => {
          cacheMap.clear();
          console.log("캐시가 삭제되었습니다.");
          intervalId && clearInterval(intervalId);
        }, time);
      });

      // 데이터 저장 시간 정하고, 주기적으로 삭제하기

      const timeSelect = document.getElementById("time");
      let time = parseInt(timeSelect.value);
      // 1분마다 캐시 삭제
      timeSelect.addEventListener("change", (e) => {
        time = parseInt(e.target.value);
        console.log(`캐시 유지 시간이 ${time}ms로 설정되었습니다.`);
      });
    </script>
  </body>
</html>
