<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input id="search" type="number" placeholder="검색할 todo 번호 입력" />
    <p id="searchResult"></p>
    <script>
      const searchInput = document.getElementById("search");
      const searchResult = document.getElementById("searchResult");

      let timer = null;

      searchInput.addEventListener("input", (e) => {
        const todoNum = e.target.value;

        if (timer) clearTimeout(timer);

        const stId = setTimeout(() => {
          fetch(`https://jsonplaceholder.typicode.com/todos/${todoNum}`)
            .then((res) => res.json())
            .then((data) => {
              searchResult.textContent = `ID: ${data.id}, Title: ${data.title}`;
            });
        }, 500);
        timer = stId;
      });
    </script>
  </body>
</html>
